name: Generate GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}
      
      - name: Generate main metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Fortaleza
          filename: metrics/github-metrics.svg
          output_action: none           # <-- ADICIONE ESTA LINHA
          repositories: 200
          repositories_forks: no
          repositories_affiliations: owner, collaborator
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_indepth: no
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 12
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_threshold: 0%
          plugin_languages_other: no
          plugin_languages_skipped: ${{ github.repository_owner }}

      - name: Generate languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_timezone: America/Fortaleza
          filename: metrics/languages.svg
          output_action: none           # <-- ADICIONE ESTA LINHA
          repositories: 200
          repositories_forks: no
          repositories_affiliations: owner, collaborator
          plugin_languages: yes
          plugin_languages_indepth: no
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 15
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_threshold: 0%
          plugin_languages_other: no
          plugin_languages_skipped: ${{ github.repository_owner }}

      - name: Generate activity metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_timezone: America/Fortaleza
          filename: metrics/activity.svg
          output_action: none           # <-- ADICIONE ESTA LINHA
          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_filter: all
          plugin_activity_limit: 8
          plugin_activity_load: 500
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes

      - name: Commit & Push
        run: |
          git config user.name "AlanMarquesRocha"
          git config user.email "alanmarquesec2@gmail.com"
          # Copiar os SVGs gerados pelo container do metrics para o repo
          mkdir -p metrics
          cp -r /metrics_renders/metrics/* metrics/ 2>/dev/null || true
          git add -A .
          git diff --staged --quiet || (git commit -m "Update metrics - [Skip GitHub Action]" && git push)
